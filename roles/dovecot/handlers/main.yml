---
- name: restart dovecot
  ansible.builtin.service:
    name: dovecot
    state: restarted

- name: reload dovecot
  ansible.builtin.service:
    name: dovecot
    state: reloaded

- name: stop dovecot
  ansible.builtin.service:
    name: dovecot
    state: stopped

- name: start dovecot
  ansible.builtin.service:
    name: dovecot
    state: started
