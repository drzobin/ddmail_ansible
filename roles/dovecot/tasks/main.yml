---
- name: Install dovecot packages
  ansible.builtin.apt:
    pkg:
      - dovecot-core
      - dovecot-imapd
      - dovecot-lmtpd
      - dovecot-mysql
      - dovecot-managesieved
    state: present
    update_cache: yes

- name: Ensure group vmail exists with correct gid
  ansible.builtin.group:
    name: vmail
    state: present
    gid: 5000

- name: Add the user vmail
  ansible.builtin.user:
    name: vmail
    shell: /sbin/nologin
    comment: vmail
    uid: 5000
    group: vmail
    home: /var/mail
    create_home: false

- name: Create mail storage directory
  ansible.builtin.file:
    path: /var/mail/vhosts
    state: directory
    owner: vmail
    group: vmail
    mode: "0755"
    recurse: yes

- name: Remove old Dovecot configuration files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/dovecot/conf.d/10-auth.conf
    - /etc/dovecot/conf.d/10-logging.conf
    - /etc/dovecot/conf.d/10-mail.conf
    - /etc/dovecot/conf.d/10-master.conf
    - /etc/dovecot/conf.d/10-ssl.conf
    - /etc/dovecot/conf.d/10-mailcrypt.conf
    - /etc/dovecot/conf.d/auth-sql.conf.ext
    - /etc/dovecot/dovecot-sql.conf.ext

- name: Create main dovecot configuration file
  ansible.builtin.template:
    src: dovecot.conf.j2
    dest: /etc/dovecot/dovecot.conf
    owner: root
    group: root
    mode: "0644"
    backup: yes
  notify: restart dovecot

- name: Generate DH parameters if not present
  ansible.builtin.command:
    cmd: openssl dhparam -out /etc/dovecot/dh.pem 2048
    creates: /etc/dovecot/dh.pem
  notify: restart dovecot

- name: Set ownership of DH parameters file
  ansible.builtin.file:
    path: /etc/dovecot/dh.pem
    owner: root
    group: dovecot
    mode: "0640"

- name: Validate Dovecot configuration
  ansible.builtin.command:
    cmd: doveconf -n
  register: dovecot_config_check
  failed_when: dovecot_config_check.rc != 0
  changed_when: false

- name: Start and enable dovecot service
  ansible.builtin.service:
    name: dovecot
    state: started
    enabled: yes

- name: Create dovecot restart handler
  ansible.builtin.meta: flush_handlers
